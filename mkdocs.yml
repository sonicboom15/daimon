site_name: Daimon
site_url: https://sonicboom15.github.io/daimon/
site_description: The spirit that runs alongside your AI app — a pluggable sidecar runtime for LLMs
site_author: sonicboom15
repo_url: https://github.com/sonicboom15/daimon
repo_name: sonicboom15/daimon
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Configuration: configuration.md
  - HTTP API: api.md
  - SDKs:
      - Python: sdk/python.md
      - TypeScript: sdk/typescript.md
  - Providers:
      - OpenAI: providers/openai.md
      - Anthropic: providers/anthropic.md
      - Local models (llamacpp): providers/llamacpp.md
  - Tool Calls (MCP): mcp.md
  - Observability: observability.md
  - Development: development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sonicboom15/daimon
  version:
    provider: mike
