version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: daimon
    main: ./cmd/daimon
    binary: daimon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

release:
  github:
    owner: sonicboom15
    name: daimon
  name_template: "v{{ .Version }}"
