port: 3500

components:

  # ── OpenAI ────────────────────────────────────────────────────────────────
  - name: gpt4o
    type: openai
    metadata:
      default_model: gpt-4o
      # api_key: sk-...  # or set OPENAI_API_KEY env var
    # Optional: give specific models their own API key.
    # models:
    #   o1-preview:
    #     api_key: sk-o1-specific-key

  # ── Anthropic ─────────────────────────────────────────────────────────────
  - name: claude
    type: anthropic
    metadata:
      default_model: claude-opus-4-7
      # api_key: sk-ant-...  # or set ANTHROPIC_API_KEY env var
    # models:
    #   claude-haiku-4-5:
    #     api_key: sk-ant-haiku-key

  # ── llama.cpp / LM Studio (local) ─────────────────────────────────────────
  # - name: local
  #   type: llamacpp
  #   metadata:
  #     base_url: http://localhost:8080/v1   # llama.cpp default
  #     # base_url: http://localhost:1234/v1 # LM Studio default
  #     default_model: llama-3.2-3b-instruct

telemetry:
  otlp_endpoint: ""  # e.g. "localhost:4318" for a local OTel collector
