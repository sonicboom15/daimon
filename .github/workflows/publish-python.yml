name: Publish Python SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi  # matches the environment name you configure on PyPI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" sdk/python/pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" sdk/python/daimon_client/__init__.py

      - name: Build wheel and sdist
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
