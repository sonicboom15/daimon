name: Publish Java SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write   # required to push to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x sdk/java/gradlew

      - name: Compute release version
        # Strip the leading "v" so "v0.1.0" → "0.1.0" for Maven coordinates.
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Run tests
        working-directory: sdk/java
        run: ./gradlew test --no-daemon

      - name: Publish to GitHub Packages
        working-directory: sdk/java
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository --no-daemon

      - name: Publish and release to Maven Central
        working-directory: sdk/java
        env:
          # User Token from central.sonatype.com → Account → Generate User Token
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # GPG key: gpg --armor --export-secret-keys YOUR_KEY_ID
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache
