name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Builds binaries, .deb/.rpm, pushes Homebrew formula + Scoop manifest
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Submits a PR to microsoft/winget-pkgs automatically.
      # Remove the `if` condition after the first manual submission is merged.
      - uses: vedantmgoyal9/winget-releaser@v2
        if: ${{ vars.WINGET_SUBMITTED == 'true' }}
        with:
          identifier: sonicboom15.daimon
          installers-regex: '_windows_amd64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
