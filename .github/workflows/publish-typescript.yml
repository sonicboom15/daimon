name: Publish TypeScript SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm  # must match the environment name in the npmjs.com Trusted Publisher config

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No registry-url: npm publish --provenance handles OIDC auth natively.
          # Adding registry-url causes setup-node to write an _authToken entry that
          # intercepts and breaks npm's own Trusted Publishing OIDC exchange.

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

      - name: Run tests
        working-directory: sdk/typescript
        run: npm test

      - name: Publish to npm
        working-directory: sdk/typescript
        run: npm publish --provenance --access public
